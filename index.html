<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Drop Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-wrapper">
        <img class="brand-logo" src="img/cw_logo-horizontal.png" alt="charity: water logo">
        <h1 class="game-title">Jerry Can Dash</h1>
        <p class="game-tagline">Tap cans fast. Dodge traps. Hit every milestone.</p>
        <div class="score-panel">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="timer">Time: <span id="time">30</span>s</div>
            <div class="lives" aria-live="polite">Lives: <span id="lives-container" class="lives-container"></span></div>
            <button id="start-btn">Start Game</button>
            <button id="reset-btn" type="button">Reset</button>
        </div>

        <div class="mode-panel" aria-label="Difficulty settings">
            <label for="difficulty">Difficulty</label>
            <select id="difficulty" name="difficulty">
                <option value="easy">Easy</option>
                <option value="normal" selected>Normal</option>
                <option value="hard">Hard</option>
            </select>
            <p id="mode-summary" class="mode-summary" aria-live="polite"></p>
        </div>

        <p id="feedback" class="feedback">Press Start to play.</p>
        <div id="milestones" class="milestones" aria-live="polite">Milestones: 10 | 20 | 30 | 45</div>

        <div id="game-container" aria-label="Game board">
            <div id="board" class="board" aria-live="polite"></div>
        </div>

        <p id="end-message" class="end-message" aria-live="polite"></p>

        <footer class="site-footer" aria-label="charity: water links">
            <p>Support charity: water</p>
            <div class="footer-links">
                <a href="https://www.charitywater.org" target="_blank" rel="noopener noreferrer">Official Website</a>
                <a href="https://www.charitywater.org/donate" target="_blank" rel="noopener noreferrer">Donate</a>
            </div>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
